<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統監控儀表板 (Log Monitor)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            background-color: #000000;
            min-height: 100vh;
            margin: 0;
            color: #a8d8ff;
        }

        /* 背景掃描線效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 180, 255, 0.015) 2px,
                rgba(0, 180, 255, 0.015) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        h1 {
            font-size: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 6px #00c8ff, 0 0 12px #00c8ff, 0 0 24px #0088cc;
            opacity: 0.85;
            z-index: 1;
            text-align: center;
        }

        /* 新增：最後更新時間的樣式 */
        #last-updated {
            font-size: 12px;
            color: #5588aa;
            margin-bottom: 25px;
            z-index: 1;
            text-shadow: 0 0 4px rgba(0, 200, 255, 0.3);
            letter-spacing: 1px;
        }

        #navMenu {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            z-index: 1;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }

        .nav-btn {
            padding: 10px 20px;
            font-size: 14px;
            font-family: inherit;
            letter-spacing: 2px;
            cursor: pointer;
            background-color: transparent;
            color: #b8e8ff;
            border: 1px solid #00aaee;
            border-radius: 3px;
            transition: all 0.2s;
            box-shadow: 0 0 8px rgba(0, 180, 255, 0.4), inset 0 0 8px rgba(0, 180, 255, 0.05);
            text-shadow: 0 0 8px #00c8ff;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: rgba(0, 170, 238, 0.2);
            color: #fff;
            box-shadow: 0 0 16px rgba(0, 200, 255, 0.7), inset 0 0 12px rgba(0, 180, 255, 0.2);
        }

        #mainContainer {
            width: 90%;
            max-width: 800px;
            z-index: 1;
            position: relative;
        }

        h2 {
            font-size: 16px;
            border-bottom: 1px solid #00aaee;
            padding-bottom: 5px;
            margin-bottom: 20px;
            text-shadow: 0 0 5px #00c8ff;
        }

        .log-entry {
            background: rgba(0, 30, 50, 0.6);
            padding: 15px;
            margin-bottom: 15px;
            border-left: 3px solid #00aaee;
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(0, 170, 238, 0.15), inset 0 0 6px rgba(0, 150, 220, 0.05);
            animation: fadeInLED 0.4s ease-out;
            line-height: 1.5;
        }

        .log-entry.error-alert {
            border-left: 3px solid #ff3366;
            background: rgba(50, 0, 10, 0.6);
            box-shadow: 0 0 8px rgba(255, 51, 102, 0.3), inset 0 0 6px rgba(255, 51, 102, 0.1);
        }
        .log-entry.error-alert .source-tag { color: #ff99aa; text-shadow: 0 0 6px #ff3366; }
        .log-entry.error-alert .message { color: #ffcccc; text-shadow: 0 0 4px #ff3366; }

        .source-tag {
            font-size: 12px;
            color: #3a7aaa;
            margin-bottom: 8px;
            display: inline-block;
            text-shadow: 0 0 6px #0066aa;
            font-weight: bold;
        }

        .message {
            font-size: 14px;
            color: #b0dcff;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        #rawLogView {
            background: rgba(0, 15, 25, 0.8);
            border: 1px solid #005577;
            padding: 20px;
            border-radius: 4px;
            max-height: 60vh;
            overflow-y: auto;
            color: #aaddff;
            font-size: 13px;
            line-height: 1.4;
            white-space: pre-wrap;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #001122; }
        ::-webkit-scrollbar-thumb { background: #005577; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #00aaee; }

        .loading {
            text-align: center;
            font-size: 18px;
            animation: pulse 1.5s infinite;
        }

        @keyframes fadeInLED {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { opacity: 0.5; text-shadow: none; }
            50% { opacity: 1; text-shadow: 0 0 10px #00c8ff; }
            100% { opacity: 0.5; text-shadow: none; }
        }

        /* ========================================== */
        /* 新增：手機版自適應設計 (RWD Media Queries) */
        /* ========================================== */
        @media (max-width: 600px) {
            body { 
                padding-top: 15px; /* 縮小頂部留白 */
            }
            h1 { 
                font-size: 16px; /* 縮小主標題 */
                letter-spacing: 2px; 
            }
            #last-updated { 
                font-size: 11px; 
                margin-bottom: 15px; 
            }
            #navMenu { 
                gap: 8px; /* 縮小按鈕間距 */
                margin-bottom: 20px; 
                width: 95%; 
            }
            .nav-btn { 
                padding: 8px 10px; 
                font-size: 12px; /* 縮小按鈕文字 */
                flex: 1 1 calc(33% - 10px); /* 讓按鈕在手機上可以自動排版並伸展 */
                text-align: center; 
            }
            #mainContainer { 
                width: 95%; /* 讓內容更貼近邊緣以節省空間 */
            }
            .log-entry { 
                padding: 12px; 
                margin-bottom: 10px; 
            }
            .source-tag {
                font-size: 11px;
            }
            .message { 
                font-size: 12px; /* 縮小日誌文字，避免太快折行 */
            }
            h2 { 
                font-size: 14px; 
            }
            #rawLogView { 
                padding: 12px; 
                font-size: 11px; 
                max-height: 75vh; /* 手機螢幕較長，給予更多高度顯示內容 */
            }
        }
    </style>
</head>
<body>

    <h1>[ SYSTEM MONITOR DASHBOARD ]</h1>
    
    <!-- 新增：顯示最後更新時間 -->
    <div id="last-updated">[ 系統初始化中... ]</div>

    <div id="navMenu">
        <button class="nav-btn active" id="btn-dashboard" onclick="showView('dashboard')">[ 總覽警報 ]</button>
    </div>

    <div id="mainContainer">
        <div id="view-dashboard">
            <h2>>> 最新系統狀態分析</h2>
            <div id="dashboardContent">
                <div class="loading">掃描日誌資料中... Please wait...</div>
            </div>
        </div>

        <div id="view-detail" style="display: none;">
            <h2 id="detailTitle">>> Log Content</h2>
            <div id="rawLogView">載入中...</div>
        </div>
    </div>

    <script>
        // =====================================================================
        // 🛑🛑🛑 資料來源設定 🛑🛑🛑
        // =====================================================================
        const LOG_SOURCES = [
            { name: '資料平衡', fileId: '1LldN-fYIwBz3vFCp_gJF8u4F4a249aih' },
            { name: '平衡明細', fileId: '1KaG6eMMCAIce2MwIECYKWmqlbKLFvHql' },
            { name: 'SYNGBOT', fileId: '13feqrsK4o0rsBi_CE70DPH6ZmASDLNJT' }
        ];

        const ERROR_KEYWORDS = ['錯誤', 'error', '停止', '警告', 'warning'];
        // 安全白名單：包含這些字眼的行將不視為錯誤
        const SAFE_KEYWORDS = ['腳本執行完成，錯誤代碼: 0', 'error code: 0'];
        const logCache = {}; 
        
        // 設定自動更新的間隔時間 (5 分鐘 = 300,000 毫秒)
        const REFRESH_INTERVAL = 5 * 60 * 1000;

        // 確保 DOM 完全載入後再執行
        const init = () => {
            initNavigation();
            scanAllLogs();
            startAutoRefresh(); // 啟動自動刷新排程
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // 啟動 5 分鐘自動刷新機制
        function startAutoRefresh() {
            setInterval(() => {
                console.log('系統執行自動輪詢 (Polling)...');
                
                // 如果目前停留在「總覽警報」畫面，就重新掃描並渲染
                // 這樣可以避免使用者正在看完整日誌時，畫面突然被切走
                if (document.getElementById('view-dashboard').style.display !== 'none') {
                    scanAllLogs();
                } else {
                    // 如果在看完整日誌，就在背景偷偷更新 Cache，並更新時間標籤即可
                    backgroundUpdate();
                }
            }, REFRESH_INTERVAL);
        }

        function updateLastRefreshTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-TW', { hour12: false });
            document.getElementById('last-updated').innerText = `[ 最後連線時間: ${timeString} | 下次更新: 5分鐘後 ]`;
        }

        function initNavigation() {
            const navMenu = document.getElementById('navMenu');
            LOG_SOURCES.forEach((source, index) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.id = `btn-log-${index}`;
                btn.innerText = `[ ${source.name} ]`;
                btn.onclick = () => showLogDetail(index);
                navMenu.appendChild(btn);
            });
        }

        // 🏆 輔助函數：帶有超時控制的 Fetch
        async function fetchWithTimeout(resource, options = {}) {
            const { timeout = 8000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            
            try {
                const response = await fetch(resource, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (error) {
                clearTimeout(id);
                throw error;
            }
        }

        // 🏆 Fetch 函數 (加入多重 Proxy 備援與 Timeout 機制)
        async function fetchLogContent(fileId) {
            const sheetUrl = `https://docs.google.com/spreadsheets/d/${fileId}/export?format=csv`;
            const driveUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
            
            let text = "";

            try {
                const res1 = await fetchWithTimeout(sheetUrl, { timeout: 4000 });
                if (res1.ok) {
                    text = await res1.text();
                    if (!text.trim().startsWith('<!DOCTYPE html>')) return text;
                }
            } catch (e) {
                console.warn(`[Strategy 1] Google Sheets fetch failed for ${fileId}`);
            }

            const proxies = [
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(driveUrl)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(driveUrl)}`,
                `https://corsproxy.io/?${encodeURIComponent(driveUrl)}`
            ];

            for (const proxyUrl of proxies) {
                try {
                    const res2 = await fetchWithTimeout(proxyUrl, { timeout: 7000 });
                    if (res2.ok) {
                        text = await res2.text();
                        if (!text.trim().startsWith('<!DOCTYPE html>') && !text.trim().includes('window.google')) {
                            return text;
                        }
                    }
                } catch (error) {
                    console.warn(`[Strategy 2] Proxy failed or timeout: ${proxyUrl}`, error.name);
                }
            }

            return `[ 系統警示 ] 無法讀取檔案：${sourceNameByFileId(fileId)}\n--------------------------------\n錯誤：伺服器連線超時 (408) 或遭到跨網域 (CORS) 阻擋。\n\n【工程師強烈建議】：\n請將您的 Log 內容複製並貼上到全新的「Google Sheets (試算表)」中，並將程式碼的 fileId 替換為試算表的 ID。\nGoogle Sheets 原生支援跨網域讀取，能「永久且徹底」解決此連線中斷問題！`;
        }

        function sourceNameByFileId(id) {
            const s = LOG_SOURCES.find(x => x.fileId === id);
            return s ? s.name : id;
        }

        function analyzeLog(text, sourceName) {
            if (text.includes('[ 系統警示 ]')) {
                return { source: sourceName, status: 'error', message: text };
            }

            const lines = text.split('\n');
            const lowerKeywords = ERROR_KEYWORDS.map(k => k.toLowerCase());
            const lowerSafeKeywords = SAFE_KEYWORDS.map(k => k.toLowerCase());

            // 新增：取得目前時間的時間戳記與 24 小時的毫秒數
            const now = Date.now();
            const TWENTY_FOUR_HOURS_MS = 24 * 60 * 60 * 1000;

            for (let i = lines.length - 1; i >= 0; i--) {
                const currentLine = lines[i].trim();
                if (!currentLine) continue; // 忽略空行
                
                // 新增：嘗試從該行提取日期 (支援 YYYY-MM-DD 或 YYYY/MM/DD 等常見格式)
                const dateMatch = currentLine.match(/\b(20\d{2}[-/\.]\d{1,2}[-/\.]\d{1,2}(?:[\sT]\d{1,2}:\d{2}(?::\d{2})?)?)\b/);
                if (dateMatch) {
                    const logDate = new Date(dateMatch[1]).getTime();
                    // 如果這行日誌的時間早於 24 小時前，直接中斷往上搜尋 (因為越往上越舊)
                    if (!isNaN(logDate) && (now - logDate > TWENTY_FOUR_HOURS_MS)) {
                        break; // 停止掃描舊資料
                    }
                }

                const lowerLine = currentLine.toLowerCase();
                
                // 優先檢查白名單
                const isSafe = lowerSafeKeywords.some(safeKeyword => lowerLine.includes(safeKeyword));
                if (isSafe) {
                    continue; // 包含安全字串，直接跳過此行的錯誤檢查
                }

                const hasError = lowerKeywords.some(keyword => lowerLine.includes(keyword));
                
                if (hasError) {
                    const startIdx = Math.max(0, i - 1);
                    const endIdx = Math.min(lines.length - 1, i + 1);
                    const snippet = lines.slice(startIdx, endIdx + 1).join('\n');
                    return { source: sourceName, status: 'error', message: snippet };
                }
            }

            return { source: sourceName, status: 'ok', message: '[ STATUS: NORMAL ] 24小時內未偵測到異常。系統運行中。' };
        }

        // 背景更新函數 (用於當使用者正在看詳細內容時，默默更新快取)
        async function backgroundUpdate() {
            for (const source of LOG_SOURCES) {
                const text = await fetchLogContent(source.fileId);
                logCache[source.fileId] = text;
            }
            updateLastRefreshTime();
        }

        async function scanAllLogs() {
            const container = document.getElementById('dashboardContent');
            // 如果畫面上還沒有東西，才顯示大大的 Loading 字樣；若是自動刷新，則盡量不干擾視覺
            if (container.children.length === 0 || container.innerHTML.includes('掃描日誌資料中')) {
                container.innerHTML = '<div class="loading">正在連線至 Google 資料庫獲取日誌...</div>';
            }

            const reports = [];
            for (const source of LOG_SOURCES) {
                const text = await fetchLogContent(source.fileId);
                logCache[source.fileId] = text; // 快取結果
                const report = analyzeLog(text, source.name);
                reports.push(report);
            }

            container.innerHTML = '';
            reports.forEach(report => {
                const div = document.createElement('div');
                div.className = `log-entry ${report.status === 'error' ? 'error-alert' : ''}`;
                const icon = report.status === 'error' ? '⚠️ [警告/錯誤]' : '✅ [正常]';
                div.innerHTML = `
                    <div class="source-tag">${icon} 來源：${report.source}</div>
                    <div class="message">${report.message}</div>
                `;
                container.appendChild(div);
            });

            updateLastRefreshTime(); // 更新時間標記
        }

        function showView(viewName) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if (viewName === 'dashboard') {
                document.getElementById('btn-dashboard').classList.add('active');
                document.getElementById('view-dashboard').style.display = 'block';
                document.getElementById('view-detail').style.display = 'none';
                scanAllLogs(); // 切換回首頁時強制重新整理一次
            }
        }

        async function showLogDetail(index) {
            const source = LOG_SOURCES[index];
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-log-${index}`).classList.add('active');
            
            document.getElementById('view-dashboard').style.display = 'none';
            document.getElementById('view-detail').style.display = 'block';
            document.getElementById('detailTitle').innerText = `>> 完整日誌：${source.name}`;
            
            const viewer = document.getElementById('rawLogView');
            viewer.innerHTML = '<span class="loading">讀取檔案中...</span>';

            let text = logCache[source.fileId];
            if (!text || text.includes('[ 系統警示 ]')) {
                text = await fetchLogContent(source.fileId);
                logCache[source.fileId] = text;
            }

            viewer.textContent = text;
            viewer.scrollTop = viewer.scrollHeight; // 自動捲動到最底部看最新訊息
        }
    </script>
</body>
</html>
