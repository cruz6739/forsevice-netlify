<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簽到系統 (Persistent Version)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #000000;
            min-height: 100vh;
            margin: 0;
        }

        /* 背景掃描線效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 180, 255, 0.015) 2px,
                rgba(0, 180, 255, 0.015) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        h1 {
            color: #a8d8ff;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow:
                0 0 6px #00c8ff,
                0 0 12px #00c8ff,
                0 0 24px #0088cc;
            opacity: 0.85;
            z-index: 1;
        }

        #checkInBtn {
            padding: 15px 40px;
            font-size: 16px;
            font-family: inherit;
            letter-spacing: 3px;
            cursor: pointer;
            background-color: transparent;
            color: #b8e8ff;
            border: 1px solid #00aaee;
            border-radius: 3px;
            transition: all 0.2s;
            box-shadow:
                0 0 8px rgba(0, 180, 255, 0.4),
                inset 0 0 8px rgba(0, 180, 255, 0.05);
            text-shadow:
                0 0 8px #00c8ff,
                0 0 16px #00aaee;
            margin-bottom: 30px;
            z-index: 1;
            position: relative;
        }

        #checkInBtn:hover {
            background-color: rgba(0, 170, 238, 0.1);
            color: #d8f4ff;
            box-shadow:
                0 0 16px rgba(0, 200, 255, 0.7),
                0 0 32px rgba(0, 160, 220, 0.4),
                inset 0 0 12px rgba(0, 180, 255, 0.1);
            text-shadow:
                0 0 10px #00d8ff,
                0 0 20px #00aaee,
                0 0 40px #0088cc;
        }

        #checkInBtn:active {
            transform: translateY(2px);
            box-shadow:
                0 0 6px rgba(0, 180, 255, 0.3),
                inset 0 0 6px rgba(0, 180, 255, 0.15);
        }

        #logContainer {
            width: 80%;
            max-width: 500px;
            text-align: left;
            z-index: 1;
            position: relative;
        }

        .log-entry {
            background: rgba(0, 30, 50, 0.6);
            padding: 10px 15px;
            margin-bottom: 8px;
            border-left: 3px solid #00aaee;
            border-radius: 2px;
            box-shadow:
                0 0 8px rgba(0, 170, 238, 0.15),
                inset 0 0 6px rgba(0, 150, 220, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeInLED 0.4s ease-out;
        }

        @keyframes fadeInLED {
            from {
                opacity: 0;
                transform: translateX(-10px);
                box-shadow: 0 0 20px rgba(0, 200, 255, 0.5);
            }
            to {
                opacity: 1;
                transform: translateX(0);
                box-shadow: 0 0 8px rgba(0, 170, 238, 0.15);
            }
        }

        .timestamp {
            font-weight: 400;
            color: #b0dcff;
            font-size: 14px;
            letter-spacing: 1px;
            text-shadow:
                0 0 6px #00aaee,
                0 0 12px rgba(0, 150, 220, 0.5);
        }

        .index-tag {
            font-size: 11px;
            color: #3a7aaa;
            margin-right: 10px;
            text-shadow: 0 0 6px #0066aa;
        }

        #clearBtn {
            margin-top: 20px;
            background: none;
            border: none;
            color: #2a5a7a;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
            letter-spacing: 2px;
            text-decoration: none;
            text-shadow: none;
            z-index: 1;
            position: relative;
            transition: all 0.2s;
        }
        #clearBtn:hover {
            color: #ff4466;
            text-shadow: 0 0 8px rgba(255, 60, 80, 0.6);
        }
    </style>
</head>
<body>

    <h1>[ CHECK-IN SYSTEM ]</h1>
    <button id="checkInBtn">📍 立即簽到</button>

    <div id="logContainer"></div>

    <button id="clearBtn" onclick="clearLogs()">[ 清除所有紀錄 ]</button>

    <script>
        const STORAGE_KEY = 'checkin_history_v1';
        const container = document.getElementById('logContainer');
        const btn = document.getElementById('checkInBtn');

        function loadLogs() {
            const logs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            container.innerHTML = '';
            logs.forEach((log, index) => {
                createLogElement(log, logs.length - index);
            });
        }

        function createLogElement(text, index) {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `
                <div>
                    <span class="index-tag">#${String(index).padStart(3, '0')}</span>
                    <span class="timestamp">${text}</span>
                </div>
            `;
            container.prepend(div);
        }

        function handleCheckIn() {
            const now = new Date();
            const timeString = now.toLocaleString('zh-TW', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            });

            const currentCount = document.querySelectorAll('.log-entry').length + 1;
            createLogElement(timeString, currentCount);

            const logs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            logs.push(timeString);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
        }

        function clearLogs() {
            if(confirm('確定要刪除所有簽到紀錄嗎？')) {
                localStorage.removeItem(STORAGE_KEY);
                container.innerHTML = '';
            }
        }

        document.addEventListener('DOMContentLoaded', loadLogs);
        btn.addEventListener('click', handleCheckIn);
    </script>
</body>
</html>
