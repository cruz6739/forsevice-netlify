<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系統監控儀表板 (Log Monitor)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * { box-sizing: border-box; }

        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            background-color: #000000;
            min-height: 100vh;
            margin: 0;
            color: #a8d8ff;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 180, 255, 0.015) 2px,
                rgba(0, 180, 255, 0.015) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        h1 {
            font-size: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 6px #00c8ff, 0 0 12px #00c8ff, 0 0 24px #0088cc;
            opacity: 0.85;
            z-index: 1;
            text-align: center;
            padding: 0 10px;
        }

        #last-updated {
            font-size: 12px;
            color: #5588aa;
            margin-bottom: 25px;
            z-index: 1;
            text-shadow: 0 0 4px rgba(0, 200, 255, 0.3);
            letter-spacing: 1px;
            text-align: center;
            transition: color 0.3s;
        }

        .status-syncing {
            color: #00e5ff !important;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.8) !important;
            animation: pulseSync 1s infinite alternate;
        }

        @keyframes pulseSync {
            from { opacity: 0.7; }
            to { opacity: 1; text-shadow: 0 0 15px rgba(0, 229, 255, 1); }
        }

        #navMenu {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            z-index: 1;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
            width: 100%;
        }

        .nav-btn {
            padding: 10px 20px;
            font-size: 14px;
            font-family: inherit;
            letter-spacing: 2px;
            cursor: pointer;
            background-color: transparent;
            color: #b8e8ff;
            border: 1px solid #00aaee;
            border-radius: 3px;
            transition: all 0.2s;
            box-shadow: 0 0 8px rgba(0, 180, 255, 0.4), inset 0 0 8px rgba(0, 180, 255, 0.05);
            text-shadow: 0 0 8px #00c8ff;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: rgba(0, 170, 238, 0.2);
            color: #fff;
            box-shadow: 0 0 16px rgba(0, 200, 255, 0.7), inset 0 0 12px rgba(0, 180, 255, 0.2);
        }

        #mainContainer {
            width: 90%;
            max-width: 800px;
            z-index: 1;
            position: relative;
        }

        h2 {
            font-size: 16px;
            border-bottom: 1px solid #00aaee;
            padding-bottom: 5px;
            margin-bottom: 20px;
            text-shadow: 0 0 5px #00c8ff;
        }

        .log-entry {
            background: rgba(0, 30, 50, 0.6);
            padding: 15px;
            margin-bottom: 15px;
            border-left: 3px solid #00aaee;
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(0, 170, 238, 0.15), inset 0 0 6px rgba(0, 150, 220, 0.05);
            animation: fadeInLED 0.4s ease-out;
            line-height: 1.5;
        }

        .log-entry.error-alert {
            border-left: 3px solid #ff3366;
            background: rgba(50, 0, 10, 0.6);
            box-shadow: 0 0 8px rgba(255, 51, 102, 0.3), inset 0 0 6px rgba(255, 51, 102, 0.1);
        }
        .log-entry.error-alert .source-tag { color: #ff99aa; text-shadow: 0 0 6px #ff3366; }
        .log-entry.error-alert .message { color: #ffcccc; text-shadow: 0 0 4px #ff3366; }

        .source-tag {
            font-size: 12px;
            color: #3a7aaa;
            margin-bottom: 8px;
            display: inline-block;
            text-shadow: 0 0 6px #0066aa;
            font-weight: bold;
        }

        .message {
            font-size: 14px;
            color: #b0dcff;
            word-wrap: break-word;
            word-break: break-all;
            overflow-wrap: anywhere;
            white-space: pre-wrap;
        }

        #rawLogView {
            background: rgba(0, 15, 25, 0.8);
            border: 1px solid #005577;
            padding: 20px;
            border-radius: 4px;
            max-height: 60vh;
            overflow-y: auto;
            color: #aaddff;
            font-size: 13px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-all;
            overflow-wrap: anywhere;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #001122; }
        ::-webkit-scrollbar-thumb { background: #005577; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #00aaee; }

        .loading {
            text-align: center;
            font-size: 18px;
            animation: pulse 1.5s infinite;
        }

        @keyframes fadeInLED {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { opacity: 0.5; text-shadow: none; }
            50% { opacity: 1; text-shadow: 0 0 10px #00c8ff; }
            100% { opacity: 0.5; text-shadow: none; }
        }

        @media (max-width: 600px) {
            body { padding-top: 10px; }
            h1 { font-size: 15px; letter-spacing: 1px; }
            #last-updated { font-size: 10px; margin-bottom: 15px; letter-spacing: 0; }
            #navMenu { 
                display: grid;
                /* 因為現在剛好 4 個按鈕 (1總覽 + 3來源)，呈現完美 2x2 網格 */
                grid-template-columns: repeat(2, 1fr);
                gap: 8px; margin-bottom: 15px; width: 96%; 
            }
            .nav-btn { 
                padding: 10px 4px; font-size: 11px; letter-spacing: 0; 
                width: 100%; text-align: center; white-space: nowrap; 
                overflow: hidden; text-overflow: ellipsis; 
            }
            #mainContainer { width: 96%; }
            .log-entry { padding: 12px; margin-bottom: 10px; }
            .source-tag { font-size: 11px; }
            .message { font-size: 12px; }
            h2 { font-size: 14px; }
            #rawLogView { padding: 10px; font-size: 11px; max-height: 75vh; }
        }
        
        @media (max-width: 375px) {
            .nav-btn { font-size: 10px; padding: 8px 2px; }
            .message, #rawLogView { font-size: 11px; }
            h1 { font-size: 13px; }
        }
    </style>
</head>
<body>

    <h1>[ SYSTEM MONITOR DASHBOARD ]</h1>
    <div id="last-updated">[ 系統初始化中... ]</div>

    <div id="navMenu">
        <button class="nav-btn active" id="btn-dashboard" onclick="showView('dashboard')">[ 總覽警報 ]</button>
    </div>

    <div id="mainContainer">
        <div id="view-dashboard">
            <h2>>> 最新系統狀態分析</h2>
            <div id="dashboardContent">
                <div class="loading">掃描日誌資料中... Please wait...</div>
            </div>
        </div>
        <div id="view-detail" style="display: none;">
            <h2 id="detailTitle">>> Log Content</h2>
            <div id="rawLogView">載入中...</div>
        </div>
    </div>

    <script>
        // ?? 核心升級：混合雙引擎資料源 (Hybrid Data Sources)
        const LOG_SOURCES = [
            // 1. 本地直讀引擎：讀取同專案內檔案，無延遲。
            { name: '平衡明細', url: 'ypSYNCypput_log.txt' },
            // 2. Google 雲端引擎：保留原有的 Google Drive 介接通道。
            { name: 'SYNGBOT', fileId: '13feqrsK4o0rsBi_CE70DPH6ZmASDLNJT' },
            { name: 'GDVJF平衡', fileId: '1cRAxzou-AmReAejVSIFzxxA9MzzEZH6e' }
        ];

        const ERROR_KEYWORDS = ['錯誤', 'error', '停止', '警告', 'warning'];
        const SAFE_KEYWORDS = ['腳本執行完成，錯誤代碼: 0', 'error code: 0'];
        const logCache = {}; 
        
        let lastRefreshString = "尚未連線";

        const init = () => {
            initNavigation();
            scanAllLogs();
            // ?? 已移除 startAutoRefresh()，改為手動/網頁載入時更新
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // 防漏字：強制轉義 HTML 標籤的防禦函式
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag));
        }

        function updateLastRefreshTime() {
            const now = new Date();
            lastRefreshString = now.toLocaleTimeString('zh-TW', { hour12: false });
            
            const targetEl = document.getElementById('last-updated');
            targetEl.classList.remove('status-syncing');
            // ?? 更新提示文字，引導使用者自行重新整理
            targetEl.innerText = `[ 取得時間: ${lastRefreshString} | 欲獲取最新狀態請重新整理網頁 ]`;
        }

        function setSyncingState() {
            const targetEl = document.getElementById('last-updated');
            targetEl.innerText = `[ ?? 正在同步最新資料... 請稍候 ]`;
            targetEl.classList.add('status-syncing'); 
        }

        function initNavigation() {
            const navMenu = document.getElementById('navMenu');
            LOG_SOURCES.forEach((source, index) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.id = `btn-log-${index}`;
                btn.innerText = `[ ${source.name} ]`;
                btn.onclick = () => showLogDetail(index);
                navMenu.appendChild(btn);
            });
        }

        async function fetchWithTimeout(resource, options = {}) {
            const { timeout = 8000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            
            try {
                const response = await fetch(resource, { ...options, cache: 'no-store', signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (error) {
                clearTimeout(id);
                throw error;
            }
        }

        // ?? 雙引擎資料獲取函式
        async function fetchLogContent(source) {
            const timestamp = new Date().getTime(); 

            // 【引擎 A】：偵測到 url，啟動本地極速讀取
            if (source.url) {
                // 仍保留時間戳以強制破除 Github Pages/CDN 的快取
                const fetchUrl = `${source.url}?t=${timestamp}`;
                try {
                    const response = await fetchWithTimeout(fetchUrl, { timeout: 5000 });
                    if (response.ok) {
                        const text = await response.text();
                        if (text.trim().startsWith('<!DOCTYPE html>')) {
                            return `[ 系統警示 ] 檔案讀取失敗：${source.name}\n--------------------------------\n伺服器回傳了 HTML 網頁，請確認您的伺服器/專案下存在【 ${source.url} 】檔案。`;
                        }
                        return text || `[ 系統提示 ] ${source.name} 紀錄檔目前為空。`;
                    } else {
                        return `[ 系統警示 ] 檔案讀取失敗：${source.name} (HTTP ${response.status})`;
                    }
                } catch (error) {
                    return `[ 系統警示 ] 無法連線讀取：${source.name} (${error.message})`;
                }
            }

            // 【引擎 B】：偵測到 fileId，啟動 Google Drive 備援讀取
            if (source.fileId) {
                const fileId = source.fileId;
                const gvizUrl = `https://docs.google.com/spreadsheets/d/${fileId}/gviz/tq?tqx=out:csv&t=${timestamp}`;
                const sheetUrl = `https://docs.google.com/spreadsheets/d/${fileId}/export?format=csv&t=${timestamp}`;
                const driveUrl = `https://drive.google.com/uc?export=download&id=${fileId}&t=${timestamp}`;
                
                let text = "";

                try {
                    const res0 = await fetchWithTimeout(gvizUrl, { timeout: 4000 });
                    if (res0.ok) {
                        text = await res0.text();
                        if (!text.trim().startsWith('<!DOCTYPE html>') && text.trim().length > 0) return text;
                    }
                } catch(e) {}

                try {
                    const res1 = await fetchWithTimeout(sheetUrl, { timeout: 4000 });
                    if (res1.ok) {
                        text = await res1.text();
                        if (!text.trim().startsWith('<!DOCTYPE html>')) return text;
                    }
                } catch (e) {}

                const proxies = [
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(driveUrl)}&disableCache=true`,
                    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(driveUrl)}&rnd=${timestamp}`,
                    `https://corsproxy.io/?${encodeURIComponent(driveUrl)}`
                ];

                for (const proxyUrl of proxies) {
                    try {
                        const res2 = await fetchWithTimeout(proxyUrl, { timeout: 7000 });
                        if (res2.ok) {
                            text = await res2.text();
                            if (!text.trim().startsWith('<!DOCTYPE html>') && !text.trim().includes('window.google')) {
                                return text;
                            }
                        }
                    } catch (error) {
                        console.warn(`[Proxy Failed]: ${proxyUrl}`);
                    }
                }

                return `[ 系統警示 ] 無法讀取檔案：${source.name}\n--------------------------------\n錯誤：所有 Google 備援通道皆失敗。`;
            }
        }

        function analyzeLog(text, sourceName) {
            if (text.includes('[ 系統警示 ]')) return { source: sourceName, status: 'error', message: text };

            const lines = text.split('\n');
            const lowerKeywords = ERROR_KEYWORDS.map(k => k.toLowerCase());
            const lowerSafeKeywords = SAFE_KEYWORDS.map(k => k.toLowerCase());
            const now = Date.now();
            const TWENTY_FOUR_HOURS_MS = 24 * 60 * 60 * 1000;

            for (let i = lines.length - 1; i >= 0; i--) {
                const currentLine = lines[i].trim();
                if (!currentLine) continue; 
                
                const dateMatch = currentLine.match(/\b(20\d{2}[-/\.]\d{1,2}[-/\.]\d{1,2}(?:[\sT]\d{1,2}:\d{2}(?::\d{2})?)?)\b/);
                if (dateMatch) {
                    const logDate = new Date(dateMatch[1]).getTime();
                    if (!isNaN(logDate) && (now - logDate > TWENTY_FOUR_HOURS_MS)) break; 
                }

                const lowerLine = currentLine.toLowerCase();
                const isSafe = lowerSafeKeywords.some(safeKeyword => lowerLine.includes(safeKeyword));
                if (isSafe) continue; 

                const hasError = lowerKeywords.some(keyword => lowerLine.includes(keyword));
                if (hasError) {
                    const startIdx = Math.max(0, i - 1);
                    const endIdx = Math.min(lines.length - 1, i + 1);
                    const snippet = lines.slice(startIdx, endIdx + 1).join('\n');
                    return { source: sourceName, status: 'error', message: snippet };
                }
            }

            return { source: sourceName, status: 'ok', message: '[ STATUS: NORMAL ] 24小時內未偵測到異常。系統運行中。' };
        }

        async function scanAllLogs() {
            setSyncingState(); 
            const container = document.getElementById('dashboardContent');

            const reports = [];
            for (const source of LOG_SOURCES) {
                // 動態取得 Cache 鑰匙
                const cacheKey = source.url || source.fileId;
                let text = logCache[cacheKey]; 
                
                // ?? 優化：只有在初次載入(快取無資料)時才進行網路抓取
                if (!text) {
                    text = await fetchLogContent(source);
                    logCache[cacheKey] = text;
                }
                
                const report = analyzeLog(text, source.name);
                reports.push(report);
            }

            container.innerHTML = '';
            reports.forEach(report => {
                const div = document.createElement('div');
                div.className = `log-entry ${report.status === 'error' ? 'error-alert' : ''}`;
                const icon = report.status === 'error' ? '?? [警告/錯誤]' : '? [正常]';
                
                div.innerHTML = `
                    <div class="source-tag">${icon} 來源：${report.source}</div>
                    <div class="message">${escapeHTML(report.message)}</div>
                `;
                container.appendChild(div);
            });

            updateLastRefreshTime(); 
        }

        function showView(viewName) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if (viewName === 'dashboard') {
                document.getElementById('btn-dashboard').classList.add('active');
                document.getElementById('view-dashboard').style.display = 'block';
                document.getElementById('view-detail').style.display = 'none';
                
                // ?? 切換回總覽時，因為快取已有資料，會瞬間繪製完畢，不需要再重抓
                scanAllLogs(); 
            }
        }

        async function showLogDetail(index) {
            const source = LOG_SOURCES[index];
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-log-${index}`).classList.add('active');
            
            document.getElementById('view-dashboard').style.display = 'none';
            document.getElementById('view-detail').style.display = 'block';
            document.getElementById('detailTitle').innerText = `>> 完整日誌：${source.name}`;
            
            const viewer = document.getElementById('rawLogView');

            // 動態取得 Cache 鑰匙
            const cacheKey = source.url || source.fileId;
            let text = logCache[cacheKey];
            
            if (!text || text.includes('[ 系統警示 ]')) {
                viewer.innerHTML = '<span class="loading">讀取檔案中...</span>';
                text = await fetchLogContent(source);
                logCache[cacheKey] = text;
            }

            viewer.textContent = text;
            viewer.scrollTop = viewer.scrollHeight; 
        }
    </script>
</body>
</html>
